services:
  postgres:
    image: postgres:17
    restart: always
    container_name: snippetbox
    environment:
      POSTGRES_USER: web
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: snippetbox
    logging:
      options:
        max-size: 10m
        max-file: "3"
    ports:
      - "5431:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      - ./sql/create_tables.sql:/docker-entrypoint-initdb.d/create_tables.sql
